name: points-ghcr

services:
  app:
    container_name: points-ghcr-app
    # 使用GHCR镜像进行生产环境验证
    image: ghcr.io/haizhouyuan/points:${APP_TAG:-sha-latest}
    environment:
      - NODE_ENV=production
    ports:
      - "${APP_PORT:-5002}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - points-ghcr-net

networks:
  points-ghcr-net:
    driver: bridge