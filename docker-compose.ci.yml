name: points-ci

services:
  app:
    container_name: points-ci-app
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
      - CI=true
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - points-ci-net

networks:
  points-ci-net:
    driver: bridge