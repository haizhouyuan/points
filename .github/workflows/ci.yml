name: CI Quality Check

# 触发：所有 Pull Request 提交
on:
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📥 安装依赖
        run: npm ci

      - name: 🔨 构建前端
        run: npm run build

      # 如果有测试脚本，可以在此处执行
      # - name: 🧪 运行测试
      #   run: npm test

      - name: 📊 检查构建产物
        run: |
          ls -la build/
          du -sh build/

      - name: ✅ 构建成功
        run: echo "Build finished successfully. Ready for containerization."