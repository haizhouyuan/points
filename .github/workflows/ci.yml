name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  merge_group:

env:
  NODE_VERSION: '18.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 快速检查作业：构建+代码质量检查
  quality-check:
    name: Quality Check & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run type checking
        run: npm run typecheck --if-present
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Check build artifacts
        run: |
          echo "📊 Build artifacts:" 
          ls -la dist/ || ls -la build/ || echo "Build output directory not found"
          du -sh dist/ || du -sh build/ || echo "Could not calculate build size"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
          retention-days: 7

  # Docker构建和推送作业
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=sha-latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Generate build summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY

  # 容器验证作业
  container-validation:
    name: Container Validation
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create validation docker-compose
        run: |
          cat > docker-compose.validation.yml << 'EOF'
          services:
            app:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-latest
              container_name: points-validation
              environment:
                - NODE_ENV=production
              ports:
                - "3001:80"
              healthcheck:
                test: ["CMD-SHELL", "wget -qO- http://localhost || exit 1"]
                interval: 10s
                timeout: 3s
                retries: 12
                start_period: 30s
          EOF

      - name: Pull and validate container
        run: |
          echo "🚀 Starting container validation..."
          
          # 启动容器
          docker compose -f docker-compose.validation.yml up -d
          
          # 等待健康检查通过
          echo "⏳ Waiting for container to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.validation.yml ps app | grep -q "healthy"; do 
              echo "Container not healthy yet..."
              docker compose -f docker-compose.validation.yml logs app --tail=5
              sleep 5
            done
            echo "✅ Container is healthy!"
          '
          
          # 验证应用响应
          echo "🔍 Testing application response..."
          if curl -f http://localhost:3001 -o /dev/null -s; then
            echo "✅ Application responds successfully"
          else
            echo "❌ Application validation failed"
            docker compose -f docker-compose.validation.yml logs app
            exit 1
          fi
          
          # 清理
          docker compose -f docker-compose.validation.yml down -v
          
          echo "🎉 Container validation completed successfully!"

  # 汇总作业：收集所有测试结果
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [quality-check, docker-build, container-validation]
    if: always()
    
    steps:
      - name: Generate pipeline summary
        run: |
          echo "# 🚀 CI/CD Pipeline 结果汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.quality-check.result }}" == "success" ]; then
            echo "✅ 代码质量检查: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 代码质量检查: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.docker-build.result }}" == "success" ]; then
            echo "✅ Docker构建: 通过" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.docker-build.result }}" == "skipped" ]; then
            echo "⏭️ Docker构建: 跳过 (仅主分支)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Docker构建: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.container-validation.result }}" == "success" ]; then
            echo "✅ 容器验证: 通过" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.container-validation.result }}" == "skipped" ]; then
            echo "⏭️ 容器验证: 跳过 (仅主分支)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 容器验证: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细构建报告请查看 Actions artifacts 和各作业日志。" >> $GITHUB_STEP_SUMMARY