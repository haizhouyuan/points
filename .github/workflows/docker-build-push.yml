name: Build and Push Docker Image

# 触发：推送到主分支 或 打标签
on:
  push:
    branches: [ main, master ]
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🛎️ 检出代码
        uses: actions/checkout@v4

      - name: 🐳 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=sha-
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sha-latest,enable={{is_default_branch}}
            type=raw,value=sha-{{sha}},enable={{is_default_branch}}

      - name: 🔨 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 验证镜像运行
        run: |
          # 获取 sha-latest 标签镜像名
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-latest"
          echo "Testing image: $IMAGE_TAG"
          
          # 运行容器测试静态页面是否可访问
          docker run -d --name points-test -p 5002:80 $IMAGE_TAG
          sleep 10
          
          # 健康检查
          if curl -f http://localhost:5002 -o /tmp/index.html; then
            echo "✅ 健康检查通过 - 页面可正常访问"
            echo "页面大小: $(wc -c < /tmp/index.html) bytes"
          else
            echo "❌ 健康检查失败"
            docker logs points-test
            exit 1
          fi
          
          # 清理
          docker stop points-test && docker rm points-test

      # 可选：镜像安全扫描
      - name: 🚨 扫描镜像漏洞
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 上传 Trivy 扫描结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'