name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 核查 Claude 自动评审结果
        id: verify-claude
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '📋 代码评审报告';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const claudeComment = comments.find(comment =>
              comment.user?.login === 'claude[bot]' && comment.body.includes(marker)
            );

            if (!claudeComment) {
              core.setFailed('未检测到 Claude 自动评审评论，请检查 "PR Auto Review with Claude" 工作流是否成功。');
            } else {
              core.notice(`已找到 Claude 评审评论 (ID: ${claudeComment.id})`);
              console.log(`Claude review comment URL: ${claudeComment.html_url}`);
            }

      - name: 输出总结
        if: success()
        run: |
          echo "## Claude Code Review 状态" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 已检测到 Claude 自动评审评论" >> $GITHUB_STEP_SUMMARY
